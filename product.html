<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Ecosystem -- Maestro KT</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Commissioner:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="theme.js"></script>
  <script src="data.js"></script>
  <script>window.CURRENT_PAGE = 'product';</script>
  <script src="nav.js"></script>
  <style>
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    @media print { #sidebar, #nav-toggle, #nav-overlay { display: none !important; } main { margin-left: 0 !important; } }
  </style>
</head>
<body class="bg-slate-950 text-slate-300 font-sans min-h-screen antialiased">
  <div id="nav-root"></div>
  <main class="ml-0 lg:ml-[260px] min-h-screen">
    <div class="max-w-5xl mx-auto px-6 py-8 lg:px-10">

      <div id="h1"></div>
      <script>document.getElementById('h1').innerHTML = Theme.heading('Product Ecosystem', 'Maestro is built from 5 interconnected products');</script>

      <!-- Product Cards -->
      <div class="space-y-4 mb-8" id="product-cards"></div>
      <script>
        const icons = { smartphone: 'M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z', monitor: 'M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z', 'message-circle': 'M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z', 'book-open': 'M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253', cpu: 'M9 3v2m6-2v2M9 19v2m6-2v2M3 9h2m-2 6h2m14-6h2m-2 6h2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z' };

        document.getElementById('product-cards').innerHTML = DATA.products.map(p => `
          <details class="bg-slate-900 border border-slate-800 rounded-lg group">
            <summary class="px-5 py-4 cursor-pointer select-none flex items-center gap-4 hover:bg-slate-800/30 rounded-lg">
              <div class="w-10 h-10 rounded-lg bg-maestro/10 border border-maestro/20 flex items-center justify-center shrink-0">
                <svg class="w-5 h-5 text-maestro" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="${icons[p.icon] || icons.monitor}"/></svg>
              </div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2">
                  <span class="text-slate-100 font-semibold text-sm">${p.name}</span>
                  ${Theme.badge(p.status, p.status.includes('Live') ? 'green' : p.status === 'System of record' ? 'purple' : 'blue')}
                </div>
                <div class="text-slate-500 text-xs mt-0.5">${p.description}</div>
              </div>
            </summary>
            <div class="px-5 pb-5 border-t border-slate-800/50 pt-4">
              <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-3">
                <div><span class="text-slate-500 text-xs">Users:</span><div class="text-slate-300 text-sm">${p.users}</div></div>
                <div><span class="text-slate-500 text-xs">Tech:</span><div class="text-slate-300 text-sm font-mono text-xs">${p.tech}</div></div>
              </div>
              <div class="text-slate-500 text-xs mb-2">Key Features:</div>
              <ul class="text-slate-400 text-sm space-y-1">
                ${p.details.map(d => `<li class="flex items-start gap-2"><span class="text-maestro mt-1">-</span> ${d}</li>`).join('')}
              </ul>
            </div>
          </details>
        `).join('');
      </script>

      <hr class="border-slate-800 my-8">

      <!-- Data Flow -->
      <div id="h2"></div>
      <script>document.getElementById('h2').innerHTML = Theme.heading('How Products Connect', 'Data flows from client input through AI and ops to trip delivery');</script>

      <div class="bg-slate-900 border border-slate-800 rounded-lg p-6 mb-8">
        <div class="flex flex-wrap items-start justify-center gap-6">
          <div class="text-center">
            <div class="text-slate-500 text-[10px] uppercase tracking-wider mb-2">Client Input</div>
            <div class="space-y-2">
              <div class="bg-slate-800 rounded px-3 py-2 text-xs text-slate-300">WhatsApp</div>
              <div class="bg-slate-800 rounded px-3 py-2 text-xs text-slate-300">Mobile App</div>
              <div class="bg-slate-800 rounded px-3 py-2 text-xs text-slate-300">Voice</div>
            </div>
          </div>
          <div class="flex items-center pt-8"><svg class="w-6 h-6 text-maestro" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></div>
          <div class="text-center">
            <div class="text-slate-500 text-[10px] uppercase tracking-wider mb-2">Backend</div>
            <div class="bg-maestro/10 border border-maestro/20 rounded-lg px-4 py-3">
              <div class="text-maestro text-xs font-medium">NestJS Monolith</div>
              <div class="text-slate-500 text-[10px]">MongoDB + Redis + BullMQ</div>
            </div>
          </div>
          <div class="flex items-center pt-8"><svg class="w-6 h-6 text-maestro" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></div>
          <div class="text-center">
            <div class="text-slate-500 text-[10px] uppercase tracking-wider mb-2">Processing</div>
            <div class="space-y-2">
              <div class="bg-blue-500/10 border border-blue-500/20 rounded px-3 py-2 text-xs text-blue-400">AI Agents</div>
              <div class="bg-green-500/10 border border-green-500/20 rounded px-3 py-2 text-xs text-green-400">Command Center</div>
              <div class="bg-purple-500/10 border border-purple-500/20 rounded px-3 py-2 text-xs text-purple-400">Notion API</div>
            </div>
          </div>
          <div class="flex items-center pt-8"><svg class="w-6 h-6 text-maestro" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></div>
          <div class="text-center">
            <div class="text-slate-500 text-[10px] uppercase tracking-wider mb-2">Output</div>
            <div class="space-y-2">
              <div class="bg-slate-800 rounded px-3 py-2 text-xs text-slate-300">Trip Page</div>
              <div class="bg-slate-800 rounded px-3 py-2 text-xs text-slate-300">Alerts</div>
              <div class="bg-slate-800 rounded px-3 py-2 text-xs text-slate-300">Messages</div>
            </div>
          </div>
        </div>
        <div class="mt-4 text-center text-slate-600 text-xs">Modular monolith architecture -- ships 2-3x faster than microservices</div>
      </div>

      <hr class="border-slate-800 my-8">

      <!-- Tech Stack -->
      <div id="h3"></div>
      <script>document.getElementById('h3').innerHTML = Theme.heading('Tech Stack');</script>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8" id="tech-grid"></div>
      <script>
        const stackLabels = { backend: 'Backend', mobile: 'Mobile', ai: 'AI / LLMs', travelApis: 'Travel APIs' };
        const stackColors = { backend: 'blue', mobile: 'green', ai: 'purple', travelApis: 'amber' };
        document.getElementById('tech-grid').innerHTML = Object.entries(DATA.techStack).map(([key, items]) => `
          <div class="bg-slate-900 border border-slate-800 rounded-lg p-5">
            <div class="flex items-center gap-2 mb-3">
              <h3 class="text-slate-100 font-semibold text-sm">${stackLabels[key]}</h3>
              ${Theme.badge(items.length + ' tools', stackColors[key])}
            </div>
            <div class="space-y-2">
              ${items.map(t => `
                <div class="flex items-start gap-2">
                  <span class="text-maestro text-xs mt-0.5">-</span>
                  <div>
                    <span class="text-slate-300 text-sm font-medium">${t.name}</span>
                    <span class="text-slate-500 text-xs"> -- ${t.detail}</span>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `).join('');
      </script>

      <!-- Environments -->
      <div id="h4"></div>
      <script>document.getElementById('h4').innerHTML = Theme.heading('Environments');</script>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8" id="env-grid"></div>
      <script>
        const envColors = { Dev: 'amber', Staging: 'blue', Production: 'green' };
        document.getElementById('env-grid').innerHTML = DATA.environments.map(e => `
          <div class="bg-slate-900 border border-slate-800 rounded-lg p-4">
            <div class="flex items-center gap-2 mb-1">
              <span class="text-slate-100 font-semibold text-sm">${e.name}</span>
              ${Theme.badge(e.name, envColors[e.name])}
            </div>
            <div class="text-slate-500 text-xs">${e.description}</div>
            <div class="text-slate-600 text-[10px] mt-1">Owner: ${e.owner}</div>
          </div>
        `).join('');
      </script>

    </div>
  </main>
</body>
</html>
